<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | StyleUp</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>

<!-- Navbar Simplified -->
<div id="navbar">
    <h2>StyleUp</h2>
</div>

<div id="signup_container">
<form id="signupForm">
    <h2>Create Account</h2>

    <label>Full Name</label><br />
    <input id="name" type="text" placeholder="Enter your full name" required><br />

    <label>Email</label><br />
    <input id="mail" type="email" placeholder="Enter your email" required><br />

    <label>Password</label><br />
    <input id="pass" type="password" placeholder="Enter password" required><br />

    <label>Confirm Password</label><br />
    <input id="confirmPass" type="password" placeholder="Confirm password" required><br />

    <button type="submit">Sign Up</button>

    <p>Already have an account? <a href="signin.html">Sign in</a></p>
</form>

<hr>

<!-- User List Section (New Feature) -->
<div>
    <h3>Registered Users</h3>
    <ul id="userList"></ul>
</div>

</div>

<script>
const form = document.getElementById("signupForm");
const userList = document.getElementById("userList");

let users = JSON.parse(localStorage.getItem("userdata")) || [];

// Display users
function displayUsers() {
    userList.innerHTML = "";
    users.forEach((user, index) => {
        let li = document.createElement("li");
        li.innerHTML = `
            ${user.name} (${user.Email})
            <button onclick="deleteUser(${index})">Delete</button>
        `;
        userList.appendChild(li);
    });
}

// Delete user
function deleteUser(index) {
    users.splice(index, 1);
    localStorage.setItem("userdata", JSON.stringify(users));
    displayUsers();
}

// Signup handler
form.addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("mail").value.trim();
    const password = document.getElementById("pass").value;
    const confirmPassword = document.getElementById("confirmPass").value;

    if (name === "") {
        alert("Name cannot be empty");
        return;
    }

    if (!email.includes("@") || !email.includes(".")) {
        alert("Invalid email format");
        return;
    }

    if (password.length < 8) {
        alert("Password must be at least 8 characters");
        return;
    }

    if (password !== confirmPassword) {
        alert("Passwords do not match");
        return;
    }

    const newUser = { name, Email: email, Password: password };

    users.push(newUser);
    localStorage.setItem("userdata", JSON.stringify(users));

    alert("Signup successful!");
    form.reset();
    displayUsers();
});

// Initial render
displayUsers();
</script>

</body>
</html>
